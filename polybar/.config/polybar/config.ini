[colors]
background = #001d1f21
background-alt = #aa373b41
foreground = #c5c8c6
primary = #81a2be
secondary = #8abeb7
alert = #a54242
disabled = #707880
cpu-color = #e06c75
ram-color = #e5c07b
vol-color = #d19a66
time-color = #61afef

[bar/top]
monitor = HDMI-1
width = 100%
height = 24pt
radius = 0
offset-x = 0
offset-y = 0
background = ${colors.background}
foreground = ${colors.foreground}
padding-left = 2
padding-right = 2
module-margin = 1
font-0 = "JetBrainsMono Nerd Font:style=Medium:size=11;3"
font-1 = "JetBrainsMono Nerd Font:size=13;4"
modules-left = arch-news i3-custom
modules-center = cpu date memory
modules-right = network timer weather pulseaudio vpn auth-fails arch-audit
tray-position = right
tray-padding = 4
cursor-click = pointer


[module/i3-custom]
type = custom/script
exec = ~/.config/polybar/i3-workspaces.sh
tail = true

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "%{T2} %{T-}"
format-prefix-foreground = ${colors.cpu-color}
label = %percentage:2%%
label-foreground = ${colors.cpu-color}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "%{T2} %{T-}"
format-prefix-foreground = ${colors.ram-color}
label = %percentage_used:2%%
label-foreground = ${colors.ram-color}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "%{T2}󰕾 %{T-}"
format-volume-prefix-foreground = ${colors.vol-color}
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.vol-color}
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1.0
date = %I:%M%P
label = %date%
label-foreground = ${colors.time-color}

[module/timer]
type = custom/script
exec = ~/.config/polybar/timer.sh
interval = 1
format = <label>
label = %output%
click-left = ~/.config/polybar/timer.sh toggle

[module/network]
type = custom/script
exec = ~/.config/polybar/network.sh
interval = 2
format = <label>
label = %output%

[module/vpn]
type = custom/script
exec = ~/.config/polybar/vpn.sh
interval = 5
format = <label>
label = %output%
click-left = ~/.config/polybar/vpn-toggle.sh &

[module/weather]
type = custom/script
exec = ~/.config/polybar/weather.sh
interval = 3600
format = <label>
label = %output%

[module/auth-fails]
type = custom/script
exec = ~/.config/polybar/auth-fails.sh
interval = 300
format = <label>
label = %output%
click-left = kitty --hold -e journalctl --since "24 hours ago" -q | grep -iE "authentication failure|Failed password|Invalid user|FAILED"

[module/arch-audit]
type = custom/script
exec = ~/.config/polybar/arch-audit.sh
interval = 3600
format = <label>
label = %output%
click-left = kitty --hold -e arch-audit

[module/arch-news]
type = custom/script
exec = ~/.config/polybar/arch_news_headless.py
interval = 3600
format = <label>
label = %output%
click-left = ~/.config/polybar/arch_news_headless.py --open && polybar-msg action "#arch-news.module.usr1"
click-right = ~/.config/polybar/arch_news_headless.py --mark-read && polybar-msg action "#arch-news.module.usr1"

[settings]
screenchange-reload = true
pseudo-transparency = true
