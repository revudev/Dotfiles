backend = "glx";
use-damage = true;
vsync = true;

corner-radius = 12;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

shadow = true;
shadow-radius = 20;
shadow-opacity = 0.5;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-exclude = [
  "class_g = 'Polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'tooltip'",
  "window_type = 'popup_menu'",
  "_GTK_FRAME_EXTENTS@:c"
];

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 4;
fade-exclude = [
  "window_type = 'dock'",
  "class_g = 'Dunst'"
];

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 8;
blur-background-frame = true;
blur-background-fixed = false;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
  "100:class_g = 'Polybar'",
  "95:class_g = 'kitty'",
  "95:class_g = 'Alacritty'"
];

wintypes:
{
  tooltip    = { fade = true; shadow = false; opacity = 0.9; focus = true; };
  popup_menu = { fade = true; shadow = false; opacity = 0.95; };
  dropdown_menu = { fade = true; shadow = false; opacity = 0.95; };
  dock       = { shadow = false; blur-background = false; };
  desktop    = { shadow = false; blur-background = false; };
  dnd        = { shadow = false; };
};

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
unredir-if-possible = false;
